name: finance_companion
description: A personal finance companion app built with Flutter and BLoC.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  intl: ^0.18.1
  fl_chart: ^0.65.0
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  iconsax: ^0.0.8
  gap: ^3.0.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
